{% extends 'base.html' %}

{% block content %}

<h2>Find Nth Node</h2>

<div class="form-container">
    

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Search</button>
    </form>

    {% if result %}
    <p><strong>Result:</strong> {{ result }}</p>
    {% endif %}
</div>


{% endblock %}
